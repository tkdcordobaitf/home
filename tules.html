<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <meta name="keywords" content="Córdoba, Taekwondo, Tkd, ITF" />

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/icons/main-icon.png" />

  <body>
    <div id="social-media">
      <a
        href="https://www.instagram.com/stories/tkdcordoba.itf/"
        target="_blank"
      >
        <img src="images/instagram.png" alt="Instagram" /> tkdcordoba.itf

    <header>
      <img
        src="images/icons/main-icon.png"
        alt="Córdoba Taekwondo ITF"
        class="main-logo"
      />
      <h1>Córdoba Taekwondo ITF</h1>
    </header>
    <nav>
      <a href="index.html">Teórico</a>
      <a href="dojans.html">Dojanes</a>

    <main class="tules">
      <h2>Tules</h2>
      <h3>Gubs</h3>
      <div class="gubs">
        <button
          type="button"
          class="white-belt on-progress"
          onclick="selectTul('sajujirugi')"
        >
          Saju Jirugi
        </button>
        <button
          type="button"
          class="white-belt on-progress"
          onclick="selectTul('sajumakgi')"
        >
          Saju Makgi
        </button>
        <button
          type="button"
          class="white-yellow-belt"
          onclick="selectTul('chonji')"
        >
          Chon-ji
        </button>
        <button
          type="button"
          class="yellow-belt on-progress"
          onclick="selectTul('dangun')"
        >
          Dan Gun
        </button>
        <button
          type="button"
          class="yellow-green-belt on-progress"
          onclick="selectTul('dosan')"
        >
          Do San
        </button>
        <button
          type="button"
          class="green-belt on-progress"
          onclick="selectTul('wonhyo')"
        >
          Won-Hyo
        </button>
        <button
          type="button"
          class="green-blue-belt on-progress"
          onclick="selectTul('yulgok')"
        >
          Yul-Gok
        </button>
        <button
          type="button"
          class="blue-belt on-progress"
          onclick="selectTul('joonggun')"
        >
          Joong-Gun
        </button>
        <button
          type="button"
          class="blue-red-belt on-progress"
          onclick="selectTul('toigye')"
        >
          Toi-Gye
        </button>
        <button
          type="button"
          class="red-belt on-progress"
          onclick="selectTul('hwarang')"
        >
          Hwa-Rang
        </button>
        <button
          type="button"
          class="red-black-belt on-progress"
          onclick="selectTul('choongmoo')"
        >
          Choong-Moo
        </button>
      </div>
      <h3>Danes</h3>
      <div class="danes">
        <button type="button" class="black-belt" onclick="selectTul('kwangae')">
          Kwan-Gae
        </button>
        <button type="button" class="black-belt" onclick="selectTul('poeum')">
          Po-Eum
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('gebaek')"
        >
          Ge-Baek
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('euiam')"
        >
          Eui-Am
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('choongjang')"
        >
          Choong-Jang
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('juche')"
        >
          Juche
        </button>
        <button type="button" class="black-belt" onclick="selectTul('samil')">
          Sam-Il
        </button>
        <button type="button" class="black-belt" onclick="selectTul('yoosin')">
          Yoo-Sin
        </button>
        <button
          type="button"
          class="black-belt"
          onclick="selectTul('choiyong')"
        >
          Choi-yong
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('yonggae')"
        >
          Yon-Gae
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('ulji')"
        >
          Ul-Ji
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('moonmoo')"
        >
          Moon-Moo
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('sosan')"
        >
          So-San
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('sejong')"
        >
          Se-Jong
        </button>
        <button
          type="button"
          class="black-belt on-progress"
          onclick="selectTul('tongil')"
        >
          Tong-Il
        </button>
      </div>
      <br /><br />
      <h3 id="tul-name"></h3>
      <p><strong>Descripción:</strong> <span id="tul-description"></span></p>
      <p><strong>Cinturón:</strong> <span id="tul-belt"></span></p>
      <p><strong>Diagrama:</strong> <span id="tul-diagram"></span></p>
      <p>
        <strong>Cantidad de Movimientos:</strong>
        <span id="tul-qty-movements"></span>
      </p>
      <p><strong>Junbi:</strong> <span id="tul-junbi"></span></p>
      <p><strong>Inicio:</strong> <span id="tul-start"></span></p>
      <p><strong>Fin:</strong> <span id="tul-finish"></span></p>
      <div id="player"></div>

      <br />

      <div id="tul-movements" class="tul-movements"></div>

      <script src="https://www.youtube.com/iframe_api"></script>
      <script src="script.js"></script>
    </main>
  </body>
</html>
