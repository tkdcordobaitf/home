<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Córdoba Taekwondo ITF</title>
    <meta name="description" content="Córdoba Taekwondo ITF" />
    <meta name="keywords" content="Córdoba, Taekwondo, Tkd, ITF" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/icons/main-icon.png" />
  </head>
  <body>
    <div id="social-media">
      <a
        href="https://www.instagram.com/stories/tkdcordoba.itf/"
        target="_blank"
      >
        <img src="images/instagram.png" alt="Instagram" /> tkdcordoba.itf
      </a>
    </div>
    <header>
      <img
        src="images/icons/main-icon.png"
        alt="Córdoba Taekwondo ITF"
        class="main-logo"
      />
      <h1>Córdoba Taekwondo ITF</h1>
    </header>
    <nav>
      <a href="index.html">Teórico</a>
      <a href="dojans.html">Dojanes</a>
      <a href="tules.html">Tules</a>
      <a href="tienda.html">Tienda</a>
    </nav>
    <main class="tules">
      <h2>Tules</h2>
      <h3>Gubs</h3>
      <div class="gubs">
        <button type="button" class="white-belt on-progress">
          Saju Jirugi
        </button>
        <button type="button" class="white-belt on-progress">Saju Makgi</button>
        <button
          type="button"
          class="white-yellow-belt"
          onclick="selectTul('chonji')"
        >
          Chon-ji
        </button>
        <button type="button" class="yellow-belt on-progress">Dan Gun</button>
        <button type="button" class="yellow-green-belt on-progress">
          Do San
        </button>
        <button type="button" class="green-belt on-progress">Won-Hyo</button>
        <button type="button" class="green-blue-belt on-progress">
          Yul-Gok
        </button>
        <button type="button" class="blue-belt on-progress">Joong-Gun</button>
        <button type="button" class="blue-red-belt on-progress">Toi-Gye</button>
        <button type="button" class="red-belt on-progress">Hwa-Rang</button>
        <button type="button" class="red-black-belt on-progress">
          Choong-Moo
        </button>
      </div>
      <h3>Danes</h3>
      <div class="danes">
        <button type="button" class="black-belt" onclick="selectTul('kwangae')">
          Kwan-Gae
        </button>
        <button type="button" class="black-belt" onclick="selectTul('poeum')">
          Po-Eum
        </button>
        <button type="button" class="black-belt on-progress">Ge-Baek</button>
        <button type="button" class="black-belt on-progress">Eui-Am</button>
        <button type="button" class="black-belt on-progress">
          Choong-Jang
        </button>
        <button type="button" class="black-belt on-progress">Juche</button>
        <button type="button" class="black-belt" onclick="selectTul('samil')">
          Sam-Il
        </button>
        <button type="button" class="black-belt" onclick="selectTul('yoosin')">
          Yoo-Sin
        </button>
        <button type="button" class="black-belt on-progress">Choi-yong</button>
        <button type="button" class="black-belt on-progress">Yon-Gae</button>
        <button type="button" class="black-belt on-progress">Ul-Ji</button>
        <button type="button" class="black-belt on-progress">Moon-Moo</button>
        <button type="button" class="black-belt on-progress">So-San</button>
        <button type="button" class="black-belt on-progress">Se-Jong</button>
        <button type="button" class="black-belt on-progress">Tong-Il</button>
      </div>
      <br /><br />
      <h3 id="tul-name"></h3>
      <p><strong>Descripción:</strong> <span id="tul-description"></span></p>
      <p><strong>Cinturón:</strong> <span id="tul-belt"></span></p>
      <p><strong>Diagrama:</strong> <span id="tul-diagram"></span></p>
      <p>
        <strong>Cantidad de Movimientos:</strong>
        <span id="tul-qty-movements"></span>
      </p>
      <p><strong>Junbi:</strong> <span id="tul-junbi"></span></p>
      <p><strong>Inicio:</strong> <span id="tul-start"></span></p>
      <p><strong>Fin:</strong> <span id="tul-finish"></span></p>
      <div id="player"></div>

      <br />

      <div id="tul-movements" class="tul-movements"></div>

      <script src="https://www.youtube.com/iframe_api"></script>
      <script src="script.js"></script>
    </main>
  </body>
</html>
