<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Córdoba Taekwondo ITF</title>
    <meta name="description" content="Córdoba Taekwondo ITF" />
    <meta name="keywords" content="Córdoba, Taekwondo, Tkd, ITF" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/icons/main-icon.png" />
  </head>
  <body>
    <div id="social-media">
      <a
        href="https://www.instagram.com/stories/tkdcordoba.itf/"
        target="_blank"
      >
        <img src="images/instagram.png" alt="Instagram" /> tkdcordoba.itf
      </a>
    </div>
    <header>
      <img
        src="images/icons/main-icon.png"
        alt="Córdoba Taekwondo ITF"
        class="main-logo"
      />
      <h1>Córdoba Taekwondo ITF</h1>
    </header>
    <nav>
      <a href="index.html">Teórico</a>
      <a href="dojans.html">Dojanes</a>
      <a href="tules.html">Tules</a>
      <a href="tienda.html">Tienda</a>
    </nav>
    <main class="tules">
      <h2>Tules</h2>
      <h3>Gubs</h3>
      <div class="gubs">
        <button type="button" class="white-belt">Saju Jirugi</button>
        <button type="button" class="white-belt">Saju Makgi</button>
        <button
          type="button"
          class="white-yellow-belt"
          onclick="selectTul('chonji')"
        >
          Chon-ji
        </button>
        <button type="button" class="yellow-belt">Dan Gun</button>
        <button type="button" class="yellow-green-belt">Do San</button>
        <button type="button" class="green-belt">Won-Hyo</button>
        <button type="button" class="green-blue-belt">Yul-Gok</button>
        <button type="button" class="blue-belt">Joong-Gun</button>
        <button type="button" class="blue-red-belt">Toi-Gye</button>
        <button type="button" class="red-belt">Hwa-Rang</button>
        <button type="button" class="red-black-belt">Choong-Moo</button>
      </div>
      <h3>Danes</h3>
      <div class="danes">
        <button type="button" class="black-belt" onclick="selectTul('kwangae')">
          Kwan-Gae
        </button>
        <button type="button" class="black-belt">Po-Eum</button>
        <button type="button" class="black-belt">Ge-Baek</button>
        <button type="button" class="black-belt">Eui-Am</button>
        <button type="button" class="black-belt">Choong-Jang</button>
        <button type="button" class="black-belt">Juche</button>
        <button type="button" class="black-belt">Choi-yong</button>
        <button type="button" class="black-belt">Sam-Il</button>
        <button type="button" class="black-belt">Yoo-Sin</button>
      </div>
      <br /><br />
      <h3 id="tul-name"></h3>
      <p><strong>Descripción:</strong> <span id="tul-description"></span></p>
      <p><strong>Cinturón:</strong> <span id="tul-belt"></span></p>
      <p><strong>Diagrama:</strong> <span id="tul-diagram"></span></p>
      <p>
        <strong>Cantidad de Movimientos:</strong>
        <span id="tul-qty-movements"></span>
      </p>
      <div id="player"></div>

      <br />

      <div id="tul-movements" class="tul-movements"></div>

      <script src="https://www.youtube.com/iframe_api"></script>
      <script src="script.js"></script>
    </main>
  </body>
</html>
